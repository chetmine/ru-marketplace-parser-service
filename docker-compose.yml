services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - ".env"
    ports:
      - "5432:5432"
    networks:
      - app-network

  pgadmin:
    container_name: pgadmin-container
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: 155455
    ports:
      - "5050:80"

  redis:
    image: redis:latest
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    networks:
      - app-network

  message-broker:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - ".env"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

volumes:
  redisdata:
  rabbitmq_data:

networks:
  app-network:
    driver: bridge